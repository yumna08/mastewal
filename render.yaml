services:
  - type: web
    name: mastewal
    env: node
    region: oregon
     buildCommand: |
       echo "=== Starting build ===" && \
       cd client && \
       echo "Installing client..." && npm install && \
       echo "Building client..." && npm run build && \
       echo "Build complete. Checking dist:" && ls -la dist/ && \
       cd ../server && \
       echo "Installing server..." && npm install && \
       echo "Build finished"
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
