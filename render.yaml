services:
  - type: web
    name: mastewal
    env: node
    region: oregon
    buildCommand: bash build.sh
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
